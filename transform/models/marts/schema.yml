version: 2

models:
  - name: mart_default_analysis
    description: "Análisis de cartera hipotecaria agrupado por vintage, estado y perfil de riesgo"
    columns:
      - name: vintage_year
        description: "Año de originación del préstamo"
        tests:
          - not_null

      - name: total_loans
        description: "Número de préstamos en el grupo"
        tests:
          - not_null

      - name: total_upb
        description: "Unpaid Balance total del grupo"
        tests:
          - not_null

  - name: mart_vintage_analysis
    description: "Análisis de cartera por cohorte trimestral para vintage analysis"
    columns:
      - name: cohort
        description: "Identificador de cohorte (ej: 2018-Q1)"
        tests:
          - not_null

      - name: total_loans
        description: "Número de préstamos originados en la cohorte"
        tests:
          - not_null

      - name: high_ltv_upb_pct
        description: "Porcentaje del UPB con LTV superior al 80%"
    
  - name: mart_geographic_concentration
    description: "Concentración geográfica del riesgo de cartera por estado"
    columns:
      - name: property_state
        description: "Estado de la propiedad"
        tests:
          - not_null
          - unique

      - name: upb_concentration_pct
        description: "Porcentaje del UPB total concentrado en este estado"
        tests:
          - not_null